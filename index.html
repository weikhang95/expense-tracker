<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operation Patchwork — AI Bug Hunt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="mission-control/mission-control.css">
</head>

<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <svg class="header__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2.5" />
          <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4" />
        </svg>
        <h1 class="header__title">Expense Tracker</h1>
      </div>
      <p class="header__subtitle">Operation Patchwork — AI Bug Hunt</p>
    </header>

    <div class="layout">

      <!-- Left: Tracker Column -->
      <main class="tracker-column">
        <!-- Balance Card -->
        <section class="balance-card">
          <p class="balance-card__label">Your Balance</p>
          <h2 class="balance-card__amount" id="balance">$0.00</h2>
          <div class="balance-card__divider"></div>
          <div class="balance-card__row">
            <div class="balance-card__stat">
              <div class="balance-card__icon-circle balance-card__icon-circle--income">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="19" x2="12" y2="5" />
                  <polyline points="5 12 12 5 19 12" />
                </svg>
              </div>
              <div>
                <p class="balance-card__stat-label">Income</p>
                <p class="balance-card__stat-value balance-card__stat-value--income" id="money-plus">$0.00</p>
              </div>
            </div>
            <div class="balance-card__stat">
              <div class="balance-card__icon-circle balance-card__icon-circle--expense">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <polyline points="19 12 12 19 5 12" />
                </svg>
              </div>
              <div>
                <p class="balance-card__stat-label">Expense</p>
                <p class="balance-card__stat-value balance-card__stat-value--expense" id="money-minus">$0.00</p>
              </div>
            </div>
          </div>
        </section>

        <!-- Charts Dashboard -->
        <section class="charts-dashboard">
          <h3 class="charts-dashboard__heading">Analytics</h3>
          <div class="charts-dashboard__grid">
            <div class="charts-dashboard__card">
              <canvas id="expense-donut-chart"></canvas>
            </div>
            <div class="charts-dashboard__card">
              <canvas id="income-expense-bar-chart"></canvas>
            </div>
          </div>
        </section>

        <!-- History -->
        <section class="history">
          <h3 class="history__heading">History</h3>
          <div class="search-wrapper">
            <svg class="search-wrapper__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input class="search-wrapper__input" type="text" id="search" placeholder="Search transactions..." />
          </div>
          <ul id="list" class="transaction-list"></ul>
        </section>

        <!-- Add Transaction Form -->
        <section class="form" id="form-section">
          <h3 class="form__heading">Add Transaction</h3>
          <form id="form">
            <div class="form__group">
              <label class="form__label" for="text">Description</label>
              <input class="form__input" type="text" id="text" placeholder="e.g. Servo Motor" />
            </div>
            <div class="form__group">
              <label class="form__label" for="amount">Amount</label>
              <input class="form__input" type="number" id="amount" placeholder="e.g. -250 or 3000" />
              <p class="form__hint">Negative for expense, positive for income</p>
            </div>
            <button class="form__submit" type="submit">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Add Transaction
            </button>
          </form>
        </section>
      </main>

      <!-- Right: Mission Panel Mount -->
      <aside id="mission-control-root" class="mission-panel-host" aria-label="Mission Control"></aside>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="charts.js"></script>
  <script src="script.js"></script>
  <script type="module" src="mission-control/mission-control.js"></script>
</body>

</html>
